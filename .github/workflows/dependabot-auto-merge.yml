name: Dependabot auto-merge

# Self-implemented auto-merge: GitHub's native `gh pr merge --auto`
# requires repo-level "Allow auto-merge", which is gated to Pro+
# accounts for private repos. We listen for snowfl CI completing
# on a dependabot/* branch and squash-merge instead.

on:
  workflow_run:
    workflows: ["snowfl CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]' &&
      startsWith(github.event.workflow_run.head_branch, 'dependabot/')
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Find PR for branch
        id: pr
        run: |
          NUM=$(gh pr list --repo "$GITHUB_REPOSITORY" \
              --head "${{ github.event.workflow_run.head_branch }}" \
              --state open --json number --jq '.[0].number // empty')
          if [ -z "$NUM" ]; then
            echo "No open PR for ${{ github.event.workflow_run.head_branch }}; skipping."
            exit 0
          fi
          echo "number=$NUM" >> "$GITHUB_OUTPUT"

      - name: Squash-merge
        if: steps.pr.outputs.number != ''
        run: |
          gh pr merge "${{ steps.pr.outputs.number }}" \
              --repo "$GITHUB_REPOSITORY" \
              --squash --delete-branch

name: Dependabot auto-merge

# Enables GitHub's native auto-merge on Dependabot PRs for minor/patch bumps.
# GitHub then merges automatically once required status checks (the project CI)
# pass. Major bumps are intentionally skipped and left for manual review.
on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Only act on PRs opened by Dependabot.
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2

      - name: Enable auto-merge for minor/patch
        # For grouped PRs, update-type is the highest semver bump in the group,
        # so a group containing a major will NOT match here.
        if: >-
          steps.meta.outputs.update-type == 'version-update:semver-minor' ||
          steps.meta.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
